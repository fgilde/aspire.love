name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Manual release version (e.g. 0.2.0)'
        required: true
        default: '0.1.0'

jobs:
  release:
    name: Pack & publish the dotnet tool
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to create the GitHub release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Derive version
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            v="${{ github.event.inputs.version }}"
          else
            v="0.1.0"
          fi
          echo "Version: $v"
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Run tests
        run: dotnet test tests/AspireLove.Core.Tests/AspireLove.Core.Tests.csproj -c Release

      - name: Pack the CLI tool
        run: >
          dotnet pack src/AspireLove.Cli/AspireLove.Cli.csproj
          -c Release
          -o artifacts
          /p:Version=${{ steps.ver.outputs.version }}

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: aspire.love ${{ steps.ver.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          # Attach the .nupkg so the GitHub-releases update check has an asset to point at.
          files: artifacts/*.nupkg
