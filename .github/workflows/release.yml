name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Manual release version (e.g. 0.0.2)'
        required: true
        default: '0.0.1'

jobs:
  release:
    name: Pack the CLI tool & publish the desktop app
    # Pinned (windows-latest is being redirected to windows-2025 anyway) and Windows so we can
    # build the WPF desktop app; the CLI packs fine here too.
    runs-on: windows-2025

    # Opt every JS action into Node 24 (Node 20 is deprecated on the runners).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write   # needed to create the GitHub release

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # Velopack builds delta packages from the release history

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Derive version
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            v="${{ github.event.inputs.version }}"
          else
            v="0.0.1"
          fi
          echo "Version: $v"
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Run tests
        run: dotnet test tests/AspireLove.Core.Tests/AspireLove.Core.Tests.csproj -c Release

      - name: Pack the CLI tool
        run: >
          dotnet pack src/AspireLove.Cli/AspireLove.Cli.csproj
          -c Release
          -o artifacts
          /p:Version=${{ steps.ver.outputs.version }}

      - name: Publish aspire.love Studio (Windows desktop app)
        shell: pwsh
        run: |
          # Velopack needs a plain published folder (no single-file) so it can build the update package.
          dotnet publish src/AspireLove.Wpf/AspireLove.Wpf.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=false `
            -p:Version=${{ steps.ver.outputs.version }} `
            -o publish/studio

      - name: Install Velopack CLI (vpk)
        run: dotnet tool install --global vpk

      - name: Pack aspire.love Studio with Velopack
        shell: pwsh
        run: |
          vpk pack `
            --packId aspire.love `
            --packTitle "aspire.love Studio" `
            --packAuthors "Florian Gilde" `
            --packVersion ${{ steps.ver.outputs.version }} `
            --packDir publish/studio `
            --mainExe AspireLove.Wpf.exe `
            --icon src/AspireLove.Wpf/Assets/aspire.love.ico `
            --outputDir releases

      - name: Push to NuGet.org
        shell: pwsh
        run: |
          # Resolve the package explicitly — dotnet's own wildcard globbing is unreliable under pwsh.
          $pkg = Get-ChildItem artifacts/*.nupkg | Select-Object -First 1
          if (-not $pkg) { throw "No .nupkg found in artifacts/." }
          dotnet nuget push $pkg.FullName `
            --api-key "${{ secrets.NUGET_API_KEY }}" `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: aspire.love ${{ steps.ver.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          # artifacts/*.nupkg is the CLI tool. releases/* are the Velopack desktop outputs —
          # Setup.exe is the installer download; releases.win.json + assets.win.json + RELEASES
          # are what the in-app UpdateManager reads to find new versions (Velopack 0.0.1100+).
          files: |
            artifacts/*.nupkg
            releases/*
