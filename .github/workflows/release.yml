name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Manual release version (e.g. 0.0.2)'
        required: true
        default: '0.0.1'

jobs:
  release:
    name: Pack the CLI tool & publish the desktop app
    # Windows so we can build the WPF desktop app; the CLI packs fine here too.
    runs-on: windows-latest

    permissions:
      contents: write   # needed to create the GitHub release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Derive version
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            v="${{ github.event.inputs.version }}"
          else
            v="0.0.1"
          fi
          echo "Version: $v"
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Run tests
        run: dotnet test tests/AspireLove.Core.Tests/AspireLove.Core.Tests.csproj -c Release

      - name: Pack the CLI tool
        run: >
          dotnet pack src/AspireLove.Cli/AspireLove.Cli.csproj
          -c Release
          -o artifacts
          /p:Version=${{ steps.ver.outputs.version }}

      - name: Publish aspire.love Studio (Windows desktop app)
        shell: pwsh
        run: |
          dotnet publish src/AspireLove.Wpf/AspireLove.Wpf.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=none -p:DebugSymbols=false `
            -p:Version=${{ steps.ver.outputs.version }} `
            -o publish/studio
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Compress-Archive -Path publish/studio/* -DestinationPath artifacts/aspire.love-studio-win-x64.zip -Force

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: aspire.love ${{ steps.ver.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          # The .nupkg backs the CLI update check; the zip is the desktop app download.
          files: |
            artifacts/*.nupkg
            artifacts/aspire.love-studio-win-x64.zip
